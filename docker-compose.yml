version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: urlshortener_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Khansa@Mohsin
      POSTGRES_DB: urlshortener
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: urlshortener_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: Khansa@Mohsin
      DB_NAME: urlshortener
      DB_PORT: 5432
      JWT_SECRET: mysupersecretkey123
      APP_PORT: 8080

volumes:
  postgres_data: